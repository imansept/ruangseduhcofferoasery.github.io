<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ruang Seduh Coffee Roastery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #111; color: white; }
        .header { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('https://unsplash.com'); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 20px; 
        }
        .hero h1 { font-size: 60px; color: #d4a373; margin-bottom: 20px; }
        .hero p { font-size: 20px; max-width: 600px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="hero">
            <h1>Ruang Seduh</h1>
            <p>Coffee Roastery</p>
        </div>
    </div>

</body>
</html>
